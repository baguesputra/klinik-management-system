version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: klinik_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - klinik_network
  
  redis:
    image: redis:7-alpine
    container_name: klinik_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - klinik_network
  
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: klinik_app
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - '${PORT}:${PORT}'
    volumes:
      - .:/app
    networks:
      - klinik_network

volumes:
  postgres_data:
  redis_data:

networks:
  klinik_network:
    driver: bridge