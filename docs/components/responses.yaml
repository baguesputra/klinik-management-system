# docs/components/responses.yaml
components:
  responses:
    Unauthorized:
      description: Token tidak valid atau tidak disertakan
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Unauthorized

    Forbidden:
      description: Tidak memiliki akses ke resource ini
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Insufficient permissions

    NotFound:
      description: Resource tidak ditemukan
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Resource not found

    ValidationError:
      description: Validasi input gagal
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Validation failed
              errors:
                type: object
                example:
                  email: ["Invalid email format"]
                  password: ["Must contain at least one uppercase letter"]

    Conflict:
      description: Data sudah ada
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Email already registered

    TooManyRequests:
      description: Terlalu banyak request
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Too many requests, please try again after 15 minutes