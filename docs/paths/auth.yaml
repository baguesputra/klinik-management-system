# docs/paths/auth.yaml
paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registrasi akun baru
      description: Membuat akun baru dengan role default PASIEN. Rate limit 3x per jam.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  minLength: 2
                  example: Budi Santoso
                email:
                  type: string
                  format: email
                  example: budi@example.com
                password:
                  type: string
                  minLength: 8
                  example: BudiPass123
                  description: Minimal 8 karakter, harus ada huruf besar dan angka
                phone:
                  type: string
                  example: "081234567890"
      responses:
        '201':
          description: Registrasi berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Registration successful
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login dengan email & password
      description: Login dan dapatkan access token & refresh token. Rate limit 5x per 15 menit.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: superadmin@klinik.com
                password:
                  type: string
                  example: SuperAdmin123
      responses:
        '200':
          description: Login berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Login successful
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      accessToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      refreshToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Dapatkan access token baru menggunakan refresh token. Rate limit 10x per 15 menit.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Token berhasil diperbarui
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout & revoke token
      description: Logout dan blacklist access token aktif
      responses:
        '200':
          description: Logout berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get profil user yang sedang login
      responses:
        '200':
          description: Profil berhasil diambil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/google:
    get:
      tags: [Auth]
      summary: Inisiasi Google OAuth2 login
      description: Redirect ke halaman login Google
      security: []
      responses:
        '302':
          description: Redirect ke Google login page

  /api/auth/google/callback:
    get:
      tags: [Auth]
      summary: Google OAuth2 callback
      description: Google redirect ke endpoint ini setelah login. Akan redirect ke frontend dengan token di query params.
      security: []
      responses:
        '302':
          description: Redirect ke frontend dengan accessToken dan refreshToken